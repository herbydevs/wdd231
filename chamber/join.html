<!DOCTYPE html>
<html lang="en">
    <meta name="description" content="Join the Chamber of Commerce to grow your business with our networking and support programs.">
    <meta name="author" content="Your Name">
    
    <link rel="icon" href="images/favicon.ico"> 
    
    <meta property="og:title" content="Join the [Chamber Name] Membership">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://[your-username].github.io/wdd231/chamber/images/share-image.jpg">
    <meta property="og:url" content="https://[your-username].github.io/wdd231/chamber/join.html">
    <meta property="og:description" content="Apply now for a membership level that fits your business needs.">
<body>
    <header>...</header>
    <nav>...</nav>

    <main class="join-container">
        <h1>Chamber Membership Application</h1>
        
        <section class="form-section">
            <form method="get" action="thankyou.html">
                <label>First Name:
                    <input type="text" name="firstname" required autocomplete="given-name" title="Enter your first name">
                </label>

                <label>Last Name:
                    <input type="text" name="lastname" required autocomplete="family-name" title="Enter your last name">
                </label>

                <label>Organizational Title:
                    <input type="text" name="title" autocomplete="organization-title" 
                           pattern="[A-Za-z\s-]{7,}" title="Minimum 7 characters, letters, spaces, and hyphens only">
                </label>

                <label>Email Address:
                    <input type="email" name="email" required autocomplete="email" 
                           placeholder="example@domain.com" title="Enter a valid email address">
                </label>

                <label>Mobile Phone:
                    <input type="tel" name="phone" required autocomplete="tel" title="Enter your mobile number">
                </label>

                <label>Business/Organization Name:
                    <input type="text" name="organization" required autocomplete="organization" title="Enter business name">
                </label>

                <label>Membership Level:
                    <select name="level" required>
                        <option value="" disabled selected>Select a level...</option>
                        <option value="np">NP Membership (Non-Profit)</option>
                        <option value="bronze">Bronze Membership</option>
                        <option value="silver">Silver Membership</option>
                        <option value="gold">Gold Membership</option>
                    </select>
                </label>

                <label>Business Description:
                    <textarea name="description" title="Briefly describe your business"></textarea>
                </label>

                <input type="hidden" name="timestamp" id="form-timestamp">
                
                <input type="submit" value="Join the Chamber">
            </form>
        </section>

        <section class="membership-cards">
            <div class="card animate-pop" id="card-np">
                <h3>NP Membership</h3>
                <button type="button" onclick="showModal('mod-np')">Learn More</button>
            </div>
            <div class="card animate-pop" id="card-bronze">
                <h3>Bronze Membership</h3>
                <button type="button" onclick="showModal('mod-bronze')">Learn More</button>
            </div>
            <div class="card animate-pop" id="card-silver">
                <h3>Silver Membership</h3>
                <button type="button" onclick="showModal('mod-silver')">Learn More</button>
            </div>
            <div class="card animate-pop" id="card-gold">
                <h3>Gold Membership</h3>
                <button type="button" onclick="showModal('mod-gold')">Learn More</button>
            </div>
        </section>
    </main>

    <dialog id="mod-np">
        <button class="close-modal" onclick="this.closest('dialog').close()">X</button>
        <h2>NP Membership</h2>
        <p>Specifically for non-profit organizations. $0 fee.</p>
        <ul>
            <li>Directory listing</li>
            <li>Networking event invitations</li>
        </ul>
    </dialog>
    <footer>...</footer>
</body>
</html>
